        const journalMetrics = {

            "Food Policy": { q: "Q1", if: "6.1" },
            "Global Environmental Change": { q: "Q1", if: "9.2" },
            "Water Resources and Economics": { q: "Q2", if: "2.1" },

            "Ambio": { q: "Q1", if: "6.5" },
            "Waste Management": { q: "Q1", if: "8.1" },
            "Nature Climate Change": { q: "Q1", if: "28.6" },

            "Feminist Economics": { q: "Q1", if: "2.2" },

            "Agricultural Systems": { q: "Q1", if: "6.6" },

            // Defaults
            "default": { q: "Q2", if: "2.4" }
        };

        // --- 3. APP STATE ---
        let allData = [];
        let filteredData = [];

        // --- 4. INITIALIZATION ---
        window.onload = function() {
            parseData(rawCSV);
        };

        // --- 5. DATA PROCESSING ---
        function parseData(csv) {
            Papa.parse(csv, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data.map(enrichRow);
                    filteredData = [...allData];
                    populateFilters();
                    updateDashboard();
                }
            });
        }

        function enrichRow(row) {
            const title = (row.Title || row.title || "").trim();
            const year = (row.Year || row.publication_year || "").trim();
            const journal = (row.Journal || row.journal || "").trim();
            const doiSource = (row['DOI / Source'] || row.doi || row.url || "").trim();
            
            const csvStudyType = (row.StudyType || row.studyType || "").trim();
            const csvScope = (row.Scope || row.scope || "").trim();
            const csvScopusQ = (row.scopusQ || "").trim();
            const csvIF = (row.impactFactor || "").toString().trim();
            const csvIsPreprintRaw = (row.isPreprint || "").toString().trim();

            // Normalize isPreprint
            let isPreprint = false;
            if (csvIsPreprintRaw) {
                isPreprint = ["yes", "true", "1", "y"].includes(csvIsPreprintRaw.toLowerCase());
            } else {
                const journalGuess = journal.toLowerCase();
                isPreprint = journalGuess.includes("working paper") || journalGuess.includes("preprint") || journalGuess.includes("mpra");
            }

            // Bibliometrics fallback if not provided
            const metrics = journalMetrics[journal] || journalMetrics["default"];
            const impactFactor = (csvIF && csvIF !== "-") ? csvIF : metrics.if;
            const scopusQ = csvScopusQ || (isPreprint ? "N/A" : metrics.q);

            let studyType = csvStudyType || "Empirical";
            let scope = csvScope || "Firm-Level";

            return {
                ...row,
                title,
                year,
                journal,
                doiSource,
                scopusQ,
                impactFactor,
                studyType,
                scope,
                isPreprint
            };
        }

        // --- 7. FILTER LOGIC ---
        function populateFilters() {
            const types = [...new Set(allData.map(d => d.studyType).filter(Boolean))].sort();
            const qs = [...new Set(allData.map(d => d.scopusQ).filter(Boolean))].sort();
            const years = [...new Set(allData.map(d => d.year).filter(Boolean))].sort().reverse();
            const scopes = [...new Set(allData.map(d => d.scope).filter(Boolean))].sort();

            populateSelect('typeFilter', types);
            populateSelect('qFilter', qs);
            populateSelect('yearFilter', years);
            populateSelect('scopeFilter', scopes);

            // Re-bind listeners
            document.getElementById('searchInput').oninput = applyFilters;
            document.getElementById('typeFilter').onchange = applyFilters;
            document.getElementById('qFilter').onchange = applyFilters;
            document.getElementById('yearFilter').onchange = applyFilters;
            document.getElementById('scopeFilter').onchange = applyFilters;
        }

        function populateSelect(id, options) {
            const select = document.getElementById(id);
            if (!select) return;
            // Keep the first default option "All ..."
            const firstOpt = select.options[0];
            select.innerHTML = '';
            select.appendChild(firstOpt);
            
            options.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt;
                el.textContent = opt;
                select.appendChild(el);
            });
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const q = document.getElementById('qFilter').value;
            const year = document.getElementById('yearFilter').value;
            const scope = document.getElementById('scopeFilter').value;

            filteredData = allData.filter(d => {
                const matchesSearch = (d.title || "").toLowerCase().includes(search) || 
                                      (d.journal || "").toLowerCase().includes(search);
                const matchesType = type === "All" || d.studyType === type;
                const matchesQ = q === "All" || d.scopusQ === q;
                const matchesYear = year === "All" || d.year == year;
                const matchesScope = scope === "All" || d.scope === scope;

                return matchesSearch && matchesType && matchesQ && matchesYear && matchesScope;
            });

            updateDashboard();
        }

        // --- 8. UI UPDATES ---
        function updateDashboard() {
            renderTable();
            updateStats();
        }

        function updateStats() {
            // Count
            document.getElementById('countDisplay').textContent = filteredData.length;
            document.getElementById('statTotal').textContent = filteredData.length;

            // Avg Impact Factor
            let totalIF = 0;
            let countIF = 0;
            filteredData.forEach(d => {
                const val = parseFloat(d.impactFactor);
                if (!isNaN(val)) {
                    totalIF += val;
                    countIF++;
                }
            });
            const avg = countIF > 0 ? (totalIF / countIF).toFixed(2) : "0.0";
            document.getElementById('statImpact').textContent = avg;

            // Top Journal
            if (filteredData.length > 0) {
                const journalCounts = {};
                filteredData.forEach(d => { 
                    if(d.journal) journalCounts[d.journal] = (journalCounts[d.journal] || 0) + 1; 
                });
                if(Object.keys(journalCounts).length > 0) {
                    const topJournal = Object.keys(journalCounts).reduce((a, b) => journalCounts[a] > journalCounts[b] ? a : b);
                    document.getElementById('statJournal').textContent = topJournal;
                    document.getElementById('statJournal').title = topJournal;
                } else {
                    document.getElementById('statJournal').textContent = "-";
                }
            } else {
                document.getElementById('statJournal').textContent = "-";
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (filteredData.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            } else {
                document.getElementById('emptyState').classList.add('hidden');
            }

            filteredData.forEach(d => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0";
                
                // Badges
                const qBadge = d.scopusQ === 'Q1' ? `<span class="badge badge-q1">Q1</span>` : 
                               d.scopusQ === 'Q2' ? `<span class="badge badge-q2">Q2</span>` : 
                               `<span class="badge bg-slate-100 text-slate-500 border border-slate-200">${d.scopusQ || 'N/A'}</span>`;
                
                const typeBadgeColor = d.studyType === 'Review' ? 'bg-purple-100 text-purple-700 border-purple-200' : 
                                       d.studyType === 'Working Paper' ? 'bg-orange-100 text-orange-700 border-orange-200' :
                                       'bg-blue-50 text-blue-700 border-blue-100';

                const scopeIcon = d.scope === 'Policy-Relevant' ? '<i class="fa-solid fa-landmark mr-1"></i>' : '<i class="fa-solid fa-building mr-1"></i>';

                let linkHtml = '';
                if (d.doiSource) {
                    const url = d.doiSource.startsWith('http') ? d.doiSource : 'https://doi.org/' + d.doiSource;
                    linkHtml = `<a href="${url}" target="_blank" class="text-slate-400 hover:text-emerald-600 transition-colors p-2"><i class="fa-solid fa-external-link-alt"></i></a>`;
                }

                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800 text-sm leading-snug mb-1">${d.title || '-'}</div>
                        <div class="flex items-center gap-2 text-xs text-slate-500 mt-1">
                            <span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600 font-mono">${d.year || '-'}</span>
                            <span class="italic truncate max-w-[250px]" title="${d.journal || ''}">${d.journal || '-'}</span>
                            ${d.isPreprint ? '<span class="badge badge-preprint text-[10px] uppercase tracking-wide">Preprint</span>' : ''}
                        </div>
                    </td>
                    <td class="px-4 py-4 align-top">
                        <div class="flex flex-col gap-1 items-start">
                            ${qBadge}
                            <span class="text-xs text-slate-400 font-mono">IF: ${d.impactFactor || '-'}</span>
                        </div>
                    </td>
                    <td class="px-4 py-4 align-top">
                        <div class="flex flex-col gap-2 items-start">
                            <span class="badge ${typeBadgeColor} border">${d.studyType || 'Empirical'}</span>
                            <span class="text-xs text-slate-500 font-medium flex items-center">${scopeIcon} ${d.scope || '-'}</span>
                        </div>
                    </td>
                    <td class="px-4 py-4 text-right align-top">
                        ${linkHtml}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 9. EXPORT FEATURE ---
        function exportCSV() {
            const csv = Papa.unparse(filteredData);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "green_database_export.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

    </script>
