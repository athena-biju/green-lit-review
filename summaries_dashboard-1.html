"Gender audits: An approach to engendering energy policy in Nepal, Kenya and Senegal",10.1016/j.erss.2019.101378,2020,Energy Research & Social Science,Empirical,Policy-Relevant,Q1,6.7,False,"Gender audits: An approach to engendering energy policy in Nepal, Kenya and Senegal",2020,Energy Research & Social Science,10.1016/j.erss.2019.101378,Empirical,Policy-Relevant,"This paper develops and applies a gender audit methodology to national energy policies and institutions in Nepal, Kenya, and Senegal, within a wider network on gender and sustainable energy in Africa and Asia. It shows that gender audits are a partially effective alternative to gender budgeting for putting gender onto the energy-policy agenda in a sector that has lagged behind others in mainstreaming. The authors find that organizations participating in audits adopt gender-aware policies relatively quickly, especially where male staff see that policies benefit men as well as women. At the same time, pragmatic, conceptual, and political barriers mean that mainstreaming remains incomplete, and gender-sensitive commitments do not always translate into implementation. The process, however, helps establish national pools of gender-and-energy experts who can continue to support policy change in the audited countries."

                tr.className = "hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0";

                const qBadge = d.scopusQ === "Q1" ? `<span class="badge badge-q1">Q1</span>` : d.scopusQ === "Q2" ? `<span class="badge badge-q2">Q2</span>` : `<span class="badge bg-slate-100 text-slate-500 border border-slate-200">${d.scopusQ || "N/A"}</span>`;
                const typeBadgeColor = d.studyType === "Review" ? "bg-purple-100 text-purple-700 border-purple-200" : d.studyType === "Working Paper" ? "bg-orange-100 text-orange-700 border-orange-200" : "bg-blue-50 text-blue-700 border-blue-100";
                const scopeIcon = d.scope === "Policy-Relevant" ? '<i class="fa-solid fa-landmark mr-1"></i>' : '<i class="fa-solid fa-building mr-1"></i>';

                let linkHtml = "";
                const url = buildBestUrl(d);
                if (url) {
                    linkHtml = `<a href="${url}" target="_blank" rel="noopener" title="${(d.doiSource || "").trim() || "Open source"}" class="text-slate-400 hover:text-emerald-600 transition-colors p-2"><i class="fa-solid fa-external-link-alt"></i></a>`;
                }

                // Prepare modal triggers
                const hasSummary = d.summary && d.summary.trim() !== "";
                const titleClass = hasSummary ? "cursor-pointer border-b border-dashed border-slate-400 hover:border-emerald-600 transition-colors pb-0.5" : "";
                const safeSummary = hasSummary ? escapeHtml(d.summary) : "";
                const safeTitle = escapeHtml(d.title || "-");
                
                const clickEvents = hasSummary ? 
                    `onclick="openModalFromTrigger(this)" data-title="${safeTitle}" data-summary="${safeSummary}"` : "";

                const iconHtml = hasSummary ? 
                    `<button ${clickEvents} class="text-slate-400 hover:text-emerald-500 transition-colors" title="Read Summary"><i class="fa-solid fa-file-lines text-sm"></i></button>` : "";

                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex items-start gap-2 mb-1">
                            <span class="font-bold text-slate-800 text-sm leading-snug ${titleClass}" ${clickEvents}>
                                ${safeTitle}
                            </span>
                            <div class="mt-0.5 shrink-0 flex items-center">${iconHtml}</div>
                        </div>
                        <div class="flex items-center gap-2 text-xs text-slate-500 mt-1.5">
                            <span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600 font-mono">${d.year || "-"}</span>
                            <span class="italic truncate max-w-[250px]" title="${escapeHtml(d.journal || "")}">${escapeHtml(d.journal || "-")}</span>
                        </div>
                    </td>
                    <td class="px-4 py-4 align-top">
                        <div class="flex flex-col gap-1 items-start">
                            ${qBadge}
                            <span class="text-xs text-slate-400 font-mono mt-1">IF: ${d.impactFactor || "-"}</span>
                        </div>
                    </td>
                    <td class="px-4 py-4 align-top">
                        <div class="flex flex-col gap-2 items-start">
                            <span class="badge ${typeBadgeColor} border shadow-sm">${d.studyType || "Empirical"}</span>
                            <span class="text-xs text-slate-500 font-medium flex items-center">${scopeIcon} ${d.scope || "-"}</span>
                        </div>
                    </td>
                    <td class="px-4 py-4 text-right align-top">
                        ${linkHtml}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 10. EXPORT FEATURE ---
        function exportCSV() {
            // Note: Since we removed isPreprint from enrichRow, it is automatically omitted from the exported data
            const csv = Papa.unparse(filteredData);
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "green_database_with_summaries.csv");
            link.style.visibility = "hidden";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
